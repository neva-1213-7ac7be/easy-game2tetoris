<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pastel Bubble Tetris V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        :root {
            --bg-soft: #fff5f8;
            --primary-pink: #ffdae9;
            --accent-pink: #ff85a2;
            --grid-color: #fce4ec;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-soft);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 98vh;
            width: 100vw;
            max-width: 600px;
            padding: 8px;
        }

        .header-info {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            gap: 8px;
            height: 120px; /* 少し高さを確保 */
        }

        .game-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .field-border {
            background: white;
            border: 6px solid var(--primary-pink);
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(255, 182, 193, 0.3);
            overflow: hidden;
            padding: 2px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #game-canvas {
            display: block;
            border-radius: 4px;
            background-image: radial-gradient(var(--grid-color) 1.5px, transparent 0);
        }

        .footer-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 0;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .card {
            background: white;
            border: 4px solid var(--primary-pink);
            border-radius: 18px;
            padding: 8px 6px;
            flex: 1;
            max-width: 110px;
            height: 100px; /* 全てのカードの高さを統一 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上下に振り分け */
            align-items: center;
            box-shadow: 0 5px 0 var(--primary-pink);
        }

        .btn {
            background: white;
            border: 3px solid var(--primary-pink);
            border-radius: 50%;
            width: 68px;
            height: 68px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0 var(--primary-pink);
            transition: all 0.05s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--primary-pink);
        }

        .btn svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-pink);
        }

        .label { 
            font-size: 11px; 
            color: var(--accent-pink); 
            font-weight: bold; 
            height: 14px; /* ラベルの高さを固定 */
            display: flex;
            align-items: center;
        }

        /* コンテンツエリア（数値やキャンバス）を中央に配置 */
        .card-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .value { font-size: 24px; color: var(--accent-pink); font-weight: 700; line-height: 1; }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header-info">
            <div class="card">
                <div class="label">NEXT</div>
                <div class="card-content">
                    <canvas id="next-canvas" width="60" height="60"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="label">SCORE</div>
                <div class="card-content">
                    <div id="score" class="value">0</div>
                </div>
            </div>
            <div class="card">
                <div class="label">LEVEL</div>
                <div class="card-content">
                    <div id="level" class="value">1</div>
                </div>
            </div>
        </div>

        <div class="game-area" id="game-area">
            <div class="field-border" id="field-border">
                <canvas id="game-canvas"></canvas>
                <div id="game-over">
                    <p class="text-2xl font-bold text-[#ff85a2] mb-6">おしまい 🫧</p>
                    <button onclick="resetGame()" class="px-10 py-3 bg-[#ffb6c1] text-white rounded-full font-bold shadow-lg transform transition active:scale-95">Retry</button>
                </div>
            </div>
        </div>

        <div class="footer-controls">
            <div class="control-row">
                <button class="btn" 
                    onmousedown="handleInputStart('rotate')" 
                    ontouchstart="event.preventDefault(); handleInputStart('rotate')"
                    onmouseup="handleInputEnd()"
                    ontouchend="handleInputEnd()">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>
            <div class="control-row">
                <button class="btn" 
                    onmousedown="handleInputStart('left')" 
                    ontouchstart="event.preventDefault(); handleInputStart('left')"
                    onmouseup="handleInputEnd()"
                    ontouchend="handleInputEnd()">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <button class="btn" 
                    onmousedown="handleInputStart('down')" 
                    ontouchstart="event.preventDefault(); handleInputStart('down')"
                    onmouseup="handleInputEnd()"
                    ontouchend="handleInputEnd()">
                    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                </button>
                <button class="btn" 
                    onmousedown="handleInputStart('right')" 
                    ontouchstart="event.preventDefault(); handleInputStart('right')"
                    onmouseup="handleInputEnd()"
                    ontouchend="handleInputEnd()">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const COLS = 15; 
        const ROWS = 22; 
        let blockSize = 20;

        const SHAPES = {
            'T4': {
                'I': [[1,1,1,1]],
                'J': [[1,0,0], [1,1,1]],
                'L': [[0,0,1], [1,1,1]],
                'O': [[1,1], [1,1]],
                'S': [[0,1,1], [1,1,0]],
                'T': [[0,1,0], [1,1,1]],
                'Z': [[1,1,0], [0,1,1]]
            },
            'T5': {
                'P': [[1,1], [1,1], [1,0]],
                'U': [[1,0,1], [1,1,1]],
                'W': [[1,0,0], [1,1,0], [0,1,1]],
                'X': [[0,1,0], [1,1,1], [0,1,0]],
                'V': [[1,0,0], [1,0,0], [1,1,1]]
            }
        };

        const COLORS = {
            'I': '#b2e2f2', 'J': '#ffc8dd', 'L': '#ffafcc', 'O': '#fb6f92',
            'S': '#b9fbc0', 'T': '#cfbaf0', 'Z': '#fde4cf',
            'P': '#d8e2dc', 'U': '#ffe5d9', 'W': '#ffcad4', 'X': '#f4acb7', 'V': '#9d8189'
        };

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nctx = nextCanvas.getContext('2d');
        const gameArea = document.getElementById('game-area');

        let board, score, level, gameOver, dropCounter, lastTime, player;
        let isSoftDropping = false;

        function resize() {
            const areaRect = gameArea.getBoundingClientRect();
            const padding = 10;
            const availableH = areaRect.height - padding;
            const availableW = areaRect.width - padding;
            
            blockSize = Math.floor(Math.min(availableW / COLS, availableH / ROWS));
            
            canvas.width = COLS * blockSize;
            canvas.height = ROWS * blockSize;
            canvas.style.backgroundSize = `${blockSize}px ${blockSize}px`;
        }

        function resetGame() {
            resize();
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            score = 0;
            level = 1;
            gameOver = false;
            dropCounter = 0;
            lastTime = 0;
            isSoftDropping = false;
            player = { pos: {x: 0, y: 0}, matrix: null, type: null, next: null };
            document.getElementById('score').innerText = '0';
            document.getElementById('level').innerText = '1';
            document.getElementById('game-over').style.display = 'none';
            playerReset();
            update();
        }

        function drawBubbleBlock(context, x, y, type, size) {
            const baseColor = COLORS[type];
            context.save();
            const bx = x * size;
            const by = y * size;
            const r = size * 0.45;

            const grad = context.createLinearGradient(bx, by, bx + size, by + size);
            grad.addColorStop(0, adjustColor(baseColor, 30));
            grad.addColorStop(1, adjustColor(baseColor, -15));
            
            context.fillStyle = grad;
            context.beginPath();
            const margin = 1.5;
            context.roundRect(bx + margin, by + margin, size - (margin * 2), size - (margin * 2), r);
            context.fill();

            context.fillStyle = 'rgba(255, 255, 255, 0.45)';
            context.beginPath();
            context.ellipse(bx + size * 0.3, by + size * 0.3, size * 0.18, size * 0.12, Math.PI / 4, 0, Math.PI * 2);
            context.fill();

            context.restore();
        }

        function adjustColor(hex, amt) {
            let usePound = false;
            if (hex[0] == "#") { hex = hex.slice(1); usePound = true; }
            let num = parseInt(hex, 16);
            let r = (num >> 16) + amt;
            let b = ((num >> 8) & 0x00FF) + amt;
            let g = (num & 0x0000FF) + amt;
            const clamp = (v) => Math.min(255, Math.max(0, v));
            return (usePound ? "#" : "") + (clamp(g) | (clamp(b) << 8) | (clamp(r) << 16)).toString(16).padStart(6, '0');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            board.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) drawBubbleBlock(ctx, x, y, value, blockSize);
                });
            });
            if (player.matrix) {
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) drawBubbleBlock(ctx, player.pos.x + x, player.pos.y + y, player.type, blockSize);
                    });
                });
            }
        }

        function playerReset() {
            const getPiece = () => {
                const isHard = Math.random() < Math.min(0.5, (level - 1) * 0.12);
                const pool = isHard ? SHAPES.T5 : SHAPES.T4;
                const keys = Object.keys(pool);
                const type = keys[Math.floor(Math.random() * keys.length)];
                return { type, matrix: pool[type] };
            };
            if (!player.next) player.next = getPiece();
            player.type = player.next.type;
            player.matrix = player.next.matrix;
            player.next = getPiece();
            player.pos.y = 0;
            player.pos.x = Math.floor(COLS / 2) - Math.floor(player.matrix[0].length / 2);
            if (collide(board, player)) {
                gameOver = true;
                document.getElementById('game-over').style.display = 'flex';
            }
            drawNext();
        }

        function drawNext() {
            nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            const m = player.next.matrix;
            const type = player.next.type;
            
            const size = 12; 
            const mw = m[0].length;
            const mh = m.length;
            
            const ox = (nextCanvas.width - mw * size) / 2;
            const oy = (nextCanvas.height - mh * size) / 2;
            
            m.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nctx.fillStyle = COLORS[type];
                        nctx.beginPath();
                        nctx.roundRect(ox + x * size + 1, oy + y * size + 1, size - 2, size - 2, 4);
                        nctx.fill();
                        nctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        nctx.beginPath();
                        nctx.arc(ox + x * size + size * 0.3, oy + y * size + size * 0.3, size * 0.1, 0, Math.PI * 2);
                        nctx.fill();
                    }
                });
            });
        }

        function collide(board, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] === undefined || board[y + o.y][x + o.x] !== 0)) return true;
                }
            }
            return false;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) board[y + player.pos.y][x + player.pos.x] = player.type;
                });
            });
        }

        function arenaSweep() {
            let rowCount = 0;
            for (let y = board.length - 1; y >= 0; --y) {
                if (board[y].every(v => v !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    y++;
                    rowCount++;
                }
            }
            if (rowCount > 0) {
                score += rowCount * 10 * rowCount;
                level = Math.floor(score / 200) + 1;
                document.getElementById('score').innerText = score;
                document.getElementById('level').innerText = level;
            }
        }

        function performAction(key) {
            if (gameOver) return;
            if (key === 'left') { player.pos.x--; if(collide(board, player)) player.pos.x++; }
            if (key === 'right') { player.pos.x++; if(collide(board, player)) player.pos.x--; }
            if (key === 'down') playerDrop();
            if (key === 'rotate') {
                const old = player.matrix;
                player.matrix = player.matrix[0].map((_, i) => player.matrix.map(row => row[i]).reverse());
                if(collide(board, player)) player.matrix = old;
            }
            draw();
        }

        function handleInputStart(key) {
            if (key === 'down') {
                isSoftDropping = true;
            } else {
                performAction(key);
            }
        }

        function handleInputEnd() {
            isSoftDropping = false;
        }

        function update(time = 0) {
            if (gameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;

            const normalInterval = Math.max(80, 1000 - (level - 1) * 110);
            const interval = isSoftDropping ? 30 : normalInterval;

            if (dropCounter > interval) playerDrop();
            
            draw();
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', e => {
            const keys = { 37: 'left', 39: 'right', 40: 'down', 38: 'rotate', 32: 'rotate' };
            const action = keys[e.keyCode];
            if (action) {
                e.preventDefault();
                if (action === 'down') {
                    isSoftDropping = true;
                } else if (!e.repeat) {
                    performAction(action);
                }
            }
        });

        document.addEventListener('keyup', e => {
            if (e.keyCode === 40) isSoftDropping = false;
        });

        window.onload = resetGame;
        window.onresize = resetGame;
    </script>
</body>
</html>
